sonar.projectKey=muritala-osho_AfroConnect
sonar.organization=muritala-osho

sonar.projectName=AfroConnect
sonar.projectVersion=1.0

# Monorepo — scan all three packages
sonar.sources=backend,frontend,admin-dashboard

# Exclude generated, vendored, and build artefacts
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.expo/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/package-lock.json,\
  frontend/scripts/build.js,\
  admin-dashboard/js/dashboard.js

# Test file locations (not counted toward coverage gate)
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**

# JavaScript / TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=admin-dashboard/tsconfig.json

# Source encoding
sonar.sourceEncoding=UTF-8

# Security hotspot and vulnerability rules
sonar.issue.ignore.multicriteria=e1,e2
# Ignore false-positive next-auth pattern on plain React inputs
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S5604
sonar.issue.ignore.multicriteria.e1.resourceKey=admin-dashboard/views/**
# Ignore build script URL manipulation false positives
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S2083
sonar.issue.ignore.multicriteria.e2.resourceKey=frontend/scripts/**
