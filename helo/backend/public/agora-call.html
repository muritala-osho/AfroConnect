<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #remote-video { width: 100%; height: 100%; object-fit: cover; }
  #remote-video video { width: 100%; height: 100%; object-fit: cover; }
  #local-video { position: absolute; top: 10px; right: 10px; width: 120px; height: 160px; border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,0.3); z-index: 10; }
  #local-video video { width: 100%; height: 100%; object-fit: cover; }
  .status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-family: sans-serif; font-size: 16px; text-align: center; z-index: 5; }
  .hidden { display: none; }
</style>
</head>
<body>
<div id="remote-video"></div>
<div id="local-video"></div>
<div id="status" class="status">Connecting...</div>

<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
<script>
  let client = null;
  let localAudioTrack = null;
  let localVideoTrack = null;
  let joined = false;

  function sendToRN(type, data) {
    try {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({ type, ...data }));
      }
    } catch (e) {}
  }

  function updateStatus(msg) {
    document.getElementById('status').textContent = msg;
    document.getElementById('status').classList.remove('hidden');
    sendToRN('status', { message: msg });
  }

  async function joinCall(appId, channel, token, uid, callType) {
    try {
      AgoraRTC.setLogLevel(3);
      client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });

      client.on('user-published', async (user, mediaType) => {
        try {
          await client.subscribe(user, mediaType);
          console.log('Subscribed to', mediaType, 'from user', user.uid);
          if (mediaType === 'audio') {
            if (user.audioTrack) {
              user.audioTrack.play();
              console.log('Playing remote audio track');
            }
          }
          if (mediaType === 'video') {
            if (user.videoTrack) {
              document.getElementById('status').classList.add('hidden');
              user.videoTrack.play('remote-video');
              console.log('Playing remote video track');
            }
          }
          sendToRN('remote-user-joined', { uid: user.uid, mediaType });
        } catch (subErr) {
          console.error('Subscribe error:', subErr);
          sendToRN('error', { message: 'Failed to subscribe: ' + subErr.message });
        }
      });

      client.on('user-unpublished', (user, mediaType) => {
        console.log('User unpublished', mediaType, user.uid);
        if (mediaType === 'video') {
          sendToRN('remote-user-left', { uid: user.uid });
        }
      });

      client.on('user-left', (user) => {
        console.log('User left', user.uid);
        sendToRN('remote-user-left', { uid: user.uid });
      });

      updateStatus('Joining channel...');
      await client.join(appId, channel, token, uid);
      joined = true;

      localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
      
      if (callType === 'video') {
        try {
          localVideoTrack = await AgoraRTC.createCameraVideoTrack({
            facingMode: 'user'
          });
          localVideoTrack.play('local-video');
          await client.publish([localAudioTrack, localVideoTrack]);
        } catch (camErr) {
          await client.publish([localAudioTrack]);
          sendToRN('error', { message: 'Camera not available, audio only' });
        }
      } else {
        await client.publish([localAudioTrack]);
        document.getElementById('local-video').style.display = 'none';
      }

      updateStatus('Waiting for other user...');
      sendToRN('joined', { uid: uid });
    } catch (error) {
      updateStatus('Connection failed');
      sendToRN('error', { message: error.message || 'Failed to join' });
    }
  }

  async function toggleMute(muted) {
    if (localAudioTrack) {
      await localAudioTrack.setEnabled(!muted);
      sendToRN('mute-changed', { muted });
    }
  }

  async function toggleCamera(off) {
    if (localVideoTrack) {
      await localVideoTrack.setEnabled(!off);
      sendToRN('camera-changed', { off });
    }
  }

  async function switchCamera() {
    if (localVideoTrack) {
      try {
        const devices = await AgoraRTC.getCameras();
        if (devices.length > 1) {
          const currentLabel = localVideoTrack.getTrackLabel();
          const idx = devices.findIndex(d => d.label === currentLabel);
          const next = devices[(idx + 1) % devices.length];
          await localVideoTrack.setDevice(next.deviceId);
        }
      } catch (e) {}
    }
  }

  async function leaveCall() {
    try {
      if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); }
      if (localVideoTrack) { localVideoTrack.stop(); localVideoTrack.close(); }
      if (client && joined) { await client.leave(); }
    } catch (e) {}
    joined = false;
    sendToRN('left', {});
  }

  document.addEventListener('message', function(e) {
    try {
      const msg = JSON.parse(e.data);
      if (msg.action === 'join') joinCall(msg.appId, msg.channel, msg.token, msg.uid, msg.callType);
      if (msg.action === 'mute') toggleMute(msg.muted);
      if (msg.action === 'camera') toggleCamera(msg.off);
      if (msg.action === 'switch-camera') switchCamera();
      if (msg.action === 'leave') leaveCall();
    } catch (e) {}
  });

  window.addEventListener('message', function(e) {
    try {
      const msg = JSON.parse(e.data);
      if (msg.action === 'join') joinCall(msg.appId, msg.channel, msg.token, msg.uid, msg.callType);
      if (msg.action === 'mute') toggleMute(msg.muted);
      if (msg.action === 'camera') toggleCamera(msg.off);
      if (msg.action === 'switch-camera') switchCamera();
      if (msg.action === 'leave') leaveCall();
    } catch (e) {}
  });
</script>
</body>
</html>
