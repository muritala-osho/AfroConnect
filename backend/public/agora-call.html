<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agora Call Bridge</title>
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #000; overflow: hidden; }
    #local-video {
      position: absolute;
      bottom: 120px;
      right: 12px;
      width: 110px;
      height: 150px;
      z-index: 20;
      border-radius: 14px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.35);
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
      touch-action: none;
      cursor: grab;
      will-change: transform;
      -webkit-user-select: none;
      user-select: none;
    }
    #local-video:active { cursor: grabbing; }
    #local-video.switching {
      opacity: 0.45;
      transition: opacity 0.15s ease;
    }
    #remote-video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <div id="remote-video"></div>
  <div id="local-video"></div>

<script>
  var client = null;
  var localAudioTrack = null;
  var localVideoTrack = null;
  var joined = false;
  var callType = 'voice';
  var currentFacingMode = 'user';
  var hasRemoteStream = false;

  /* ── Layout: local video fills screen when alone, shrinks to PiP when remote is live ── */
  function updateVideoLayout() {
    var localEl = document.getElementById('local-video');
    if (!localEl) return;
    if (hasRemoteStream) {
      /* PiP corner */
      localEl.style.cssText = [
        'position:absolute', 'bottom:120px', 'right:12px',
        'width:110px', 'height:150px', 'z-index:20',
        'border-radius:14px', 'overflow:hidden',
        'border:2px solid rgba(255,255,255,0.35)',
        'box-shadow:0 4px 16px rgba(0,0,0,0.6)',
        'touch-action:none', 'cursor:grab', 'will-change:transform',
        '-webkit-user-select:none', 'user-select:none',
        'transition:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94)',
      ].join(';');
    } else {
      /* Full-screen — show own camera while waiting for other person */
      localEl.style.cssText = [
        'position:absolute', 'top:0', 'left:0',
        'width:100vw', 'height:100vh', 'z-index:5',
        'border-radius:0', 'overflow:hidden', 'border:none',
        'box-shadow:none', 'touch-action:none',
        '-webkit-user-select:none', 'user-select:none',
        'transition:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94)',
      ].join(';');
    }
  }

  /* ── Draggable local video with snap-to-corner ── */
  (function() {
    var el = document.getElementById('local-video');
    var startX = 0, startY = 0, origLeft = 0, origTop = 0;
    var isDragging = false;
    var MARGIN = 12;

    function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }

    function snapToCorner() {
      var W = window.innerWidth;
      var H = window.innerHeight;
      var rect = el.getBoundingClientRect();
      var cx = rect.left + rect.width  / 2;
      var cy = rect.top  + rect.height / 2;
      var goRight  = cx > W / 2;
      var goBottom = cy > H / 2;
      var targetLeft = goRight  ? (W - el.offsetWidth  - MARGIN) : MARGIN;
      var targetTop  = goBottom ? (H - el.offsetHeight - MARGIN) : (MARGIN + 56);
      el.style.transition = 'left 0.22s cubic-bezier(0.25,0.46,0.45,0.94), top 0.22s cubic-bezier(0.25,0.46,0.45,0.94)';
      el.style.left = targetLeft + 'px';
      el.style.top  = targetTop  + 'px';
      setTimeout(function() { el.style.transition = ''; }, 260);
    }

    el.addEventListener('touchstart', function(e) {
      if (!hasRemoteStream) return; /* full-screen local — don't allow drag */
      if (e.touches.length !== 1) return;
      isDragging = true;
      var t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      var rect = el.getBoundingClientRect();
      origLeft = rect.left;
      origTop  = rect.top;
      el.style.transition = '';
      el.style.right  = 'auto';
      el.style.bottom = 'auto';
      el.style.left   = origLeft + 'px';
      el.style.top    = origTop  + 'px';
      e.preventDefault();
    }, { passive: false });

    el.addEventListener('touchmove', function(e) {
      if (!isDragging || e.touches.length !== 1) return;
      var t = e.touches[0];
      var newLeft = clamp(origLeft + t.clientX - startX, 0, window.innerWidth  - el.offsetWidth);
      var newTop  = clamp(origTop  + t.clientY - startY, 0, window.innerHeight - el.offsetHeight);
      el.style.left = newLeft + 'px';
      el.style.top  = newTop  + 'px';
      e.preventDefault();
    }, { passive: false });

    el.addEventListener('touchend', function() {
      if (!isDragging) return;
      isDragging = false;
      snapToCorner();
    });
  })();

  /* ── Native bridge ── */
  function postToNative(data) {
    try {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify(data));
      }
    } catch (e) {}
  }

  window.addEventListener('load', function() {
    if (typeof AgoraRTC === 'undefined') {
      postToNative({ type: 'error', message: 'AgoraRTC SDK failed to load.' });
    } else {
      postToNative({ type: 'sdk-ready' });
    }
  });

  /* ── Join channel ── */
  async function joinChannel(appId, channel, token, uid, type) {
    if (typeof AgoraRTC === 'undefined') {
      postToNative({ type: 'error', message: 'AgoraRTC is not available.' });
      return;
    }
    try {
      callType = type || 'voice';
      client = AgoraRTC.createClient({ mode: 'rtc', codec: 'h264' });

      client.on('user-published', async function(user, mediaType) {
        await client.subscribe(user, mediaType);
        if (mediaType === 'audio') {
          user.audioTrack && user.audioTrack.play();
          postToNative({ type: 'remote-user-joined', uid: user.uid });
        }
        if (mediaType === 'video' && callType === 'video') {
          hasRemoteStream = true;
          updateVideoLayout();
          user.videoTrack && user.videoTrack.play('remote-video');
          postToNative({ type: 'remote-video-started', uid: user.uid });
        }
      });

      client.on('user-unpublished', function(user, mediaType) {
        if (mediaType === 'video') {
          hasRemoteStream = false;
          updateVideoLayout();
          postToNative({ type: 'remote-video-stopped', uid: user.uid });
        }
      });

      client.on('user-left', function(user) {
        hasRemoteStream = false;
        updateVideoLayout();
        postToNative({ type: 'remote-user-left', uid: user.uid });
      });

      client.on('connection-state-change', function(curState) {
        postToNative({ type: 'connectionState', state: curState });
      });

      client.on('network-quality', function(stats) {
        /* uplinkNetworkQuality / downlinkNetworkQuality: 0=unknown 1=excellent … 6=disconnected */
        var worst = Math.max(stats.uplinkNetworkQuality, stats.downlinkNetworkQuality);
        postToNative({ type: 'networkQuality', level: worst });
      });

      var audioConfig = {
        encoderConfig: 'speech_standard',
        AEC: true,
        ANS: true,
        AGC: true,
      };

      /* ── Start join + track creation in parallel so camera appears immediately ── */
      var joinPromise  = client.join(appId, channel, token || null, uid || 0);
      var audioPromise = AgoraRTC.createMicrophoneAudioTrack(audioConfig);

      var cameraPromise = null;
      if (callType === 'video') {
        /* Camera creation is independent of join — start immediately */
        cameraPromise = AgoraRTC.createCameraVideoTrack({
          facingMode: currentFacingMode,
          encoderConfig: '720p_1',
        }).then(function(track) {
          localVideoTrack = track;
          updateVideoLayout();        /* full-screen until remote joins */
          track.play('local-video');
          postToNative({ type: 'local-video-started' });
          return track;
        }).catch(function(camErr) {
          postToNative({ type: 'error', message: 'Camera error: ' + camErr.message });
          return null;
        });
      }

      /* Wait for channel join and audio track */
      await joinPromise;
      joined = true;
      localAudioTrack = await audioPromise;

      if (callType === 'video') {
        /* Ensure camera track is ready before publishing */
        if (cameraPromise) await cameraPromise;
        if (!localVideoTrack) {
          /* Fallback if parallel creation failed: try once more after join */
          localVideoTrack = await AgoraRTC.createCameraVideoTrack({
            facingMode: currentFacingMode,
            encoderConfig: '720p_1',
          });
          updateVideoLayout();
          localVideoTrack.play('local-video');
          postToNative({ type: 'local-video-started' });
        }
        await client.publish([localAudioTrack, localVideoTrack]);
      } else {
        await client.publish([localAudioTrack]);
      }

      postToNative({ type: 'joined', uid: client.uid });
    } catch (e) {
      postToNative({ type: 'error', message: e.message || 'Failed to join channel' });
    }
  }

  /* ── Leave channel ── */
  async function leaveChannel() {
    try {
      if (localAudioTrack) { localAudioTrack.stop(); localAudioTrack.close(); localAudioTrack = null; }
      if (localVideoTrack) { localVideoTrack.stop(); localVideoTrack.close(); localVideoTrack = null; }
      if (client && joined) { await client.leave(); }
      joined = false;
      postToNative({ type: 'left' });
    } catch (e) {
      postToNative({ type: 'error', message: e.message || 'Failed to leave channel' });
    }
  }

  /* ── Switch camera ── */
  async function switchCamera() {
    if (!localVideoTrack || callType !== 'video') return;
    var localEl = document.getElementById('local-video');
    if (localEl) localEl.classList.add('switching');
    try {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';

      /* 1. Fastest: Agora setDevice with enumerated cameras */
      try {
        var cameras = await AgoraRTC.getCameras();
        var targetCamera = null;
        if (cameras.length >= 2) {
          targetCamera = cameras.find(function(cam) {
            var label = cam.label.toLowerCase();
            return currentFacingMode === 'environment'
              ? (label.includes('back') || label.includes('rear') || label.includes('environment'))
              : (label.includes('front') || label.includes('user') || label.includes('face') || label.includes('selfie'));
          });
          /* If label matching fails, just cycle through cameras */
          if (!targetCamera) {
            var curTrack = localVideoTrack.getMediaStreamTrack();
            var curDeviceId = curTrack ? curTrack.getSettings().deviceId : null;
            var curIdx = curDeviceId ? cameras.findIndex(function(c) { return c.deviceId === curDeviceId; }) : 0;
            targetCamera = cameras[(curIdx + 1) % cameras.length];
          }
        }
        if (targetCamera) {
          await localVideoTrack.setDevice(targetCamera.deviceId);
          if (localEl) localEl.classList.remove('switching');
          postToNative({ type: 'cameraSwitched', facingMode: currentFacingMode });
          return;
        }
      } catch (deviceErr) {}

      /* 2. Fallback: applyConstraints (no 'exact' — more permissive) */
      try {
        var track = localVideoTrack.getMediaStreamTrack();
        if (track) {
          await track.applyConstraints({ facingMode: currentFacingMode });
          if (localEl) localEl.classList.remove('switching');
          postToNative({ type: 'cameraSwitched', facingMode: currentFacingMode });
          return;
        }
      } catch (constraintErr) {}

      /* 3. Last resort: recreate track */
      var oldVideoTrack = localVideoTrack;
      localVideoTrack = null;
      try { await client.unpublish([oldVideoTrack]); } catch (e) {}
      try { oldVideoTrack.stop(); oldVideoTrack.close(); } catch (e) {}

      localVideoTrack = await AgoraRTC.createCameraVideoTrack({
        facingMode: currentFacingMode,
        encoderConfig: '720p_1',
      });
      localVideoTrack.play('local-video');
      await client.publish([localVideoTrack]);
      if (localEl) localEl.classList.remove('switching');
      postToNative({ type: 'cameraSwitched', facingMode: currentFacingMode });
    } catch (e) {
      if (localEl) localEl.classList.remove('switching');
      postToNative({ type: 'error', message: 'Camera switch failed: ' + e.message });
    }
  }

  /* ── Speaker routing via audio output ── */
  async function setSpeaker(on) {
    try {
      var devices = await AgoraRTC.getPlaybackDevices();
      if (!devices || devices.length === 0) return;
      var speaker = devices.find(function(d) {
        return on
          ? (d.label.toLowerCase().includes('speaker') || d.label.toLowerCase().includes('phone'))
          : (d.label.toLowerCase().includes('earpiece') || d.label.toLowerCase().includes('receiver'));
      });
      var target = speaker || devices[0];
      if (client) {
        client.remoteUsers.forEach(function(u) {
          if (u.audioTrack) {
            u.audioTrack.setPlaybackDevice(target.deviceId).catch(function() {});
          }
        });
      }
    } catch (e) {}
  }

  /* ── Message handler ── */
  function handleMessage(event) {
    try {
      var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
      if (!data || !data.action) return;
      switch (data.action) {
        case 'join':
          joinChannel(data.appId, data.channel, data.token, data.uid, data.callType);
          break;
        case 'leave':
          leaveChannel();
          break;
        case 'mute':
          if (localAudioTrack) localAudioTrack.setMuted(data.muted === true);
          break;
        case 'camera':
          if (localVideoTrack) localVideoTrack.setMuted(data.off === true);
          break;
        case 'switch-camera':
          switchCamera();
          break;
        case 'speaker':
          setSpeaker(data.on === true);
          break;
        default:
          break;
      }
    } catch (e) {
      postToNative({ type: 'error', message: 'Message parse error: ' + e.message });
    }
  }

  window.addEventListener('message', handleMessage);
  document.addEventListener('message', handleMessage);
</script>
</body>
</html>
