name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  audit-backend:
    name: Audit Backend Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit (high + critical only)
        run: npm audit --audit-level=high --json > audit-report.json || true

      - name: Fail on high/critical vulnerabilities
        run: |
          HIGHS=$(cat audit-report.json | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const meta = d.metadata || {};
            const vulns = meta.vulnerabilities || {};
            console.log((vulns.high || 0) + (vulns.critical || 0));
          ")
          echo "High/Critical vulnerabilities found: $HIGHS"
          if [ "$HIGHS" -gt "0" ]; then
            echo "❌ $HIGHS high/critical vulnerabilities — blocking merge"
            npm audit --audit-level=high
            exit 1
          fi
          echo "✅ No high/critical vulnerabilities in backend"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-audit-report
          path: backend/audit-report.json
          retention-days: 14

  audit-frontend:
    name: Audit Frontend Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit (high + critical only)
        run: npm audit --audit-level=high --json > audit-report.json || true

      - name: Fail on high/critical vulnerabilities
        run: |
          HIGHS=$(cat audit-report.json | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const meta = d.metadata || {};
            const vulns = meta.vulnerabilities || {};
            console.log((vulns.high || 0) + (vulns.critical || 0));
          ")
          echo "High/Critical vulnerabilities found: $HIGHS"
          if [ "$HIGHS" -gt "0" ]; then
            echo "❌ $HIGHS high/critical vulnerabilities — blocking merge"
            npm audit --audit-level=high
            exit 1
          fi
          echo "✅ No high/critical vulnerabilities in frontend"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-audit-report
          path: frontend/audit-report.json
          retention-days: 14

  audit-admin:
    name: Audit Admin Dashboard Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit (high + critical only)
        run: npm audit --audit-level=high --json > audit-report.json || true

      - name: Fail on high/critical vulnerabilities
        run: |
          HIGHS=$(cat audit-report.json | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const meta = d.metadata || {};
            const vulns = meta.vulnerabilities || {};
            console.log((vulns.high || 0) + (vulns.critical || 0));
          ")
          echo "High/Critical vulnerabilities found: $HIGHS"
          if [ "$HIGHS" -gt "0" ]; then
            echo "❌ $HIGHS high/critical vulnerabilities — blocking merge"
            npm audit --audit-level=high
            exit 1
          fi
          echo "✅ No high/critical vulnerabilities in admin-dashboard"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-audit-report
          path: admin-dashboard/audit-report.json
          retention-days: 14

  snyk-scan:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    if: ${{ vars.SNYK_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan — backend
        run: snyk test --file=backend/package.json --severity-threshold=high --json > snyk-backend.json || true
        continue-on-error: true

      - name: Snyk scan — frontend
        run: snyk test --file=frontend/package.json --severity-threshold=high --json > snyk-frontend.json || true
        continue-on-error: true

      - name: Snyk scan — admin-dashboard
        run: snyk test --file=admin-dashboard/package.json --severity-threshold=high --json > snyk-admin.json || true
        continue-on-error: true

      - name: Snyk Code (SAST)
        run: snyk code test --severity-threshold=high || true
        continue-on-error: true

      - name: Upload Snyk reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-reports
          path: snyk-*.json
          retention-days: 14

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  audit-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [audit-backend, audit-frontend, audit-admin]
    if: always()
    steps:
      - name: Report final status
        run: |
          BACKEND="${{ needs.audit-backend.result }}"
          FRONTEND="${{ needs.audit-frontend.result }}"
          ADMIN="${{ needs.audit-admin.result }}"
          echo "Backend audit:    $BACKEND"
          echo "Frontend audit:   $FRONTEND"
          echo "Admin audit:      $ADMIN"
          if [[ "$BACKEND" == "failure" || "$FRONTEND" == "failure" || "$ADMIN" == "failure" ]]; then
            echo "❌ Security audit FAILED — one or more packages have high/critical vulnerabilities"
            exit 1
          fi
          echo "✅ All packages passed security audit"
